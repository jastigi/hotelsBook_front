<!--search page-->
<div class="page-title-area bg-1 ptb-100">
    <div class="container">
        <div class="page-title-content">
            <h2>Hoteles en cualquier parte del mundo</h2>
            <p>Buscar hoteles</p>
            <form class="banner-form-style">
                <div class="row align-items-center">
                    <div class="col-xl-3 col-lg-6 col-sm-5">
                        <div class="form-group">
                            <label for="">Lugar</label>
                            <input type="text" class="form-control" placeholder="Hacia donde vas?">
                            <img src="assets/images/icon/search.svg" alt="buscar">
                        </div>
                    </div>
                    <div class="col-xl-3 col-lg-6 col-sm-5">
                        <div class="form-group">
                            <label for="">Fecha Entrada</label>
                            <mat-form-field appearance="outline" class="full-width">
                                <input matInput
                                    [matDatepicker]="pickerEntrada"
                                    placeholder="Ingresar Fecha"
                                    [(ngModel)]="fechaEntrada"
                                    name="fechaEntrada">

                                <mat-datepicker-toggle matSuffix [for]="pickerEntrada"></mat-datepicker-toggle>
                                <mat-datepicker #pickerEntrada></mat-datepicker>
                            </mat-form-field>
                        </div>
                    </div>
                    <div class="col-xl-3 col-lg-6 col-sm-5">
                        <div class="form-group">
                            <label for="">Fecha Salida</label>
                            <mat-form-field appearance="outline" class="full-width">
                                <input matInput
                                    [matDatepicker]="pickerSalida"
                                    placeholder="Ingresar Fecha"
                                    [(ngModel)]="fechaSalida"
                                    name="fechaSalida">

                                <mat-datepicker-toggle matSuffix [for]="pickerSalida"></mat-datepicker-toggle>
                                <mat-datepicker #pickerSalida></mat-datepicker>
                            </mat-form-field>
                        </div>
                    </div>
                    <div class="col-lg-2 col-md-6">
                        <div class="form-group">
                            <label for="">Personas</label>
                            <input type="text" class="form-control" placeholder="Agregar">
                            <img src="assets/images/icon/user-check.svg" alt="calendario">
                        </div>
                    </div>
                    <div class="col-lg-1 col-md-112">
                        <div class="form-group ps-0 pe-0">
                            <button type="submit" class="src-btn">
                                <i class="bi bi-search"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<!--hotel listing-->
<app-hotel-listing></app-hotel-listing>
